site_name: Software Engineering Study Guide
site_description: A framework for algorithms, systems design, and infrastructure.
site_author: Richard

theme:
  name: cinder
  highlightjs: true
  hljs_languages:
    - java
    - python

extra_css:
  - css/custom.css

plugins:
    - search
    - mermaid2

nav:
  - Home: index.md

  - Systems Design:
      - "01. Storage Engines": systems/01-storage-engines.md
      - "02. Row vs Column Storage": systems/02-row-vs-column-storage.md
      - "03. Networking Fundamentals": systems/03-networking-fundamentals.md
      - "04. Search & Indexing": systems/04-search-and-indexing.md
      - "05. Caching Patterns": systems/05-caching-patterns.md
      - "06. API Design": systems/06-api-design.md
      - "07. Security Patterns": systems/07-security-patterns.md
      - "08. Rate Limiting": systems/08-rate-limiting.md
      - "09. Load Balancing": systems/09-load-balancing.md
      - "10. Concurrency Patterns": systems/10-concurrency-patterns.md
      - "11. Database Scaling": systems/11-database-scaling.md
      - "12. Message Queues": systems/12-message-queues.md
      - "13. Event Sourcing & CQRS": systems/13-event-sourcing-cqrs.md
      - "14. Stream Processing": systems/14-stream-processing.md
      - "15. Observability": systems/15-observability.md
      - "16. Resilience Patterns": systems/16-resilience-patterns.md
      - "17. Distributed Transactions": systems/17-distributed-transactions.md
      - "18. Consensus Patterns": systems/18-consensus-patterns.md
      - "19. Microservices Patterns": systems/19-microservices-patterns.md
      - "20. Multi-Region Architecture": systems/20-multi-region.md

  - DSA:
      - "01. Two Pointers": dsa/01-two-pointers.md
      - "02. Sliding Window": dsa/02-sliding-window.md
      - "03. Hash Tables": dsa/03-hash-tables.md
      - "04. Linked Lists": dsa/04-linked-lists.md
      - "05. Stacks & Queues": dsa/05-stacks--queues.md
      - "06. Trees": dsa/06-trees.md
      - "07. Binary Search": dsa/07-binary-search.md
      - "08. Heaps": dsa/08-heaps.md
      - "09. Union-Find": dsa/09-union-find.md
      - "10. Graphs": dsa/10-graphs.md
      - "11. Advanced Graphs": dsa/11-advanced-graphs.md
      - "12. Backtracking": dsa/12-backtracking.md
      - "13. Dynamic Programming": dsa/13-dynamic-programming.md
      - "14. Prefix Sums": dsa/14-prefix-sums.md
      - "15. Intervals": dsa/15-intervals.md

markdown_extensions:
  - admonition
  - codehilite
  - fenced_code
  - tables
  - toc:
      permalink: true
      toc_depth: 2
  - pymdownx.tasklist:
      custom_checkbox: true  # Recommended for better styling
  - pymdownx.details
  - pymdownx.superfences
  - md_in_html